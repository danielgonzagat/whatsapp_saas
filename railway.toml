[build]
builder = "RAILPACK"
buildCommand = "npm --prefix backend ci --include=dev && npx --prefix backend prisma generate --schema=backend/prisma/schema.prisma && npm --prefix backend run build"

[deploy]
startCommand = "cd backend && npm run start:prod"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
