name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Architecture guardrails
        run: npm run architecture:check

  quality:
    needs: architecture
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: whatsapp_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/whatsapp_saas_test
      JWT_SECRET: test_secret
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: e2e-dummy-key
      NEXT_PUBLIC_API_URL: http://localhost:3001
      BACKEND_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test_secret
      METRICS_TOKEN: test-metrics-token
      DIAG_TOKEN: test-diag-token
      ASAAS_WEBHOOK_TOKEN: test-asaas-token
      OPS_WEBHOOK_URL: https://example.com/ops-webhook
      DLQ_WEBHOOK_URL: https://example.com/dlq-webhook

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            worker/package-lock.json
            e2e/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Production readiness gate
        run: npm run readiness:check

      - name: Guard forbidden prisma db push usage
        run: npm run guard:db-push

      - name: Formatting check
        run: npm run format:check

      - name: ESLint seatbelt gate
        run: npm run seatbelt:check

      - name: Knip dead-code baseline gate
        run: npm run quality:dead-code

      - name: Madge cycle baseline gate
        run: npm run quality:graph

      - name: Contract schema sync (frontend ↔ backend)
        run: node scripts/ops/check-contract-sync.mjs

      - name: Prisma schema single source (worker symlinks backend)
        run: node scripts/ops/check-prisma-schema-single-source.mjs

      - name: Redis URL resolver sync (backend ↔ worker)
        run: node scripts/ops/check-redis-resolver-sync.mjs

      - name: Tenant isolation static scan (invariant I4)
        run: node scripts/ops/check-tenant-filter.mjs --summary

      - name: Tenant isolation redis key scan (invariant I4)
        run: node scripts/ops/check-tenant-keys.mjs --summary

      - name: Shared constants sync (sales templates etc.)
        run: node scripts/ops/check-constants-sync.mjs

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prisma validate and generate
        run: |
          npm run prisma:validate
          npm run prisma:generate

      - name: Backend test and build
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run test:cov -- --runInBand
          npm run build
        working-directory: backend

      - name: Worker test and build
        run: |
          npm run prisma:generate
          npm run test:coverage
          npm run build
        working-directory: worker

      - name: Frontend test and build
        run: |
          npm run test:coverage
          npm run build
        working-directory: frontend

      - name: Normalize LCOV paths for monorepo uploads
        run: npm run coverage:normalize

      # Codecov Coverage Analytics — one upload per workspace with a flag so
      # the dashboard separates backend/frontend/worker rollups and component
      # targets in codecov.yml resolve correctly.
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: true
          verbose: true

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true
          verbose: true

      - name: Upload worker coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: worker/coverage/lcov.info
          flags: worker
          fail_ci_if_error: true
          verbose: true

      # Codecov Test Analytics — JUnit XML upload per workspace with the same
      # flag namespace used by coverage above. `if: !cancelled()` ensures test
      # runtime data still uploads on test failure, which is the whole point
      # of Test Analytics (flaky test detection, runtime trends).
      - name: Upload backend test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/test-results/backend-junit.xml
          flags: backend

      - name: Upload frontend test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/test-results/frontend-junit.xml
          flags: frontend

      - name: Upload worker test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: worker/test-results/worker-junit.xml
          flags: worker

      - name: Upload coverage reports to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          coverage-reports: backend/coverage/lcov.info,frontend/coverage/lcov.info,worker/coverage/lcov.info

      - name: PULSE certification gate
        continue-on-error: true
        env:
          PULSE_CI_TIMEOUT_MS: '300000'
          PULSE_DISABLE_LOCAL_ENV: 'true'
        run: npm run pulse:ci

      - name: Quality ratchet gate
        run: npm run ratchet:check

      - name: Upload PULSE and readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-quality-artifacts
          path: |
            ratchet.json
            PULSE_*.json
            PULSE_*.md
            PULSE_*
            AUDIT_FEATURE_MATRIX.md
            KLOEL_PRODUCT_MAP.md
            PULSE_REPORT.md
            PULSE_CERTIFICATE.json
            backend/coverage/**
            frontend/coverage/**
            worker/coverage/**
            backend/test-results/**
            frontend/test-results/**
            worker/test-results/**
            .eslint-seatbelt.tsv
          if-no-files-found: ignore

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: whatsapp_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/whatsapp_saas_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret
      OPENAI_API_KEY: e2e-dummy-key
      NEXT_PUBLIC_API_URL: http://localhost:3001
      BACKEND_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test_secret
      ASAAS_WEBHOOK_TOKEN: test-asaas-token

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            worker/package-lock.json
            e2e/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Build backend, worker and frontend
        run: |
          cd backend
          npx prisma generate
          npx prisma migrate deploy
          npm run build
          cd ../worker
          npm run build
          cd ../frontend
          npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start services
        run: |
          set -euo pipefail

          cd backend
          node dist/src/bootstrap.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          cd - >/dev/null

          cd worker
          node dist/bootstrap.js > /tmp/worker.log 2>&1 &
          echo $! > /tmp/worker.pid
          cd - >/dev/null

          cd frontend
          PORT=3000 npm run start > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          cd - >/dev/null

          echo "Aguardando backend..."
          for i in {1..60}; do
            if curl -sf http://localhost:3001/health >/dev/null; then
              echo "✓ backend"
              break
            fi
            sleep 2
            if [[ "$i" == "60" ]]; then
              echo "Backend não ficou pronto"
              tail -n 200 /tmp/backend.log || true
              exit 1
            fi
          done

          echo "Aguardando worker..."
          for i in {1..60}; do
            if curl -sf http://localhost:3003/health >/dev/null; then
              echo "✓ worker"
              break
            fi
            sleep 2
            if [[ "$i" == "60" ]]; then
              echo "Worker não ficou pronto"
              tail -n 200 /tmp/worker.log || true
              exit 1
            fi
          done

          echo "Aguardando frontend..."
          for i in {1..60}; do
            if curl -sf http://localhost:3000/login >/dev/null; then
              echo "✓ frontend"
              break
            fi
            sleep 2
            if [[ "$i" == "60" ]]; then
              echo "Frontend não ficou pronto"
              tail -n 200 /tmp/frontend.log || true
              exit 1
            fi
          done

      - name: Run Playwright E2E
        env:
          PW_TEST_HTML_REPORT_OPEN: never
        run: npm test
        working-directory: e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          if-no-files-found: ignore

      - name: Stop services and print logs
        if: always()
        run: |
          for f in /tmp/frontend.pid /tmp/worker.pid /tmp/backend.pid; do
            if [ -f "$f" ]; then
              pid=$(cat "$f")
              kill "$pid" 2>/dev/null || true
            fi
          done

          echo "--- backend.log ---"
          tail -n 200 /tmp/backend.log || true
          echo "--- worker.log ---"
          tail -n 200 /tmp/worker.log || true
          echo "--- frontend.log ---"
          tail -n 200 /tmp/frontend.log || true
