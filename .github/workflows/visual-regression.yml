name: Visual Regression (P6.5-1, I20)

# Wave 3 P6.5-1 enforcement: every PR must produce zero pixel diff
# against the committed visual baselines for the 15 critical screens.
# A diff fails the PR check.
#
# See e2e/visual/README.md for the operator runbook.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      # Run on any change that could affect the visual surface.
      - 'frontend/**'
      - 'e2e/visual/**'
      - 'e2e/playwright.config.ts'
      - 'e2e/specs/e2e-helpers.ts'
      - '.github/workflows/visual-regression.yml'
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: pr_number and update_snapshots are operator-controlled
    # inputs for the visual baseline refresh runbook. Both are read via env vars
    # (INPUT_PR_NUMBER, UPDATE_SNAPSHOTS_INPUT) inside script contexts and never
    # interpolated directly into shell run commands.
    inputs:
      pr_number:
        description: 'PR number whose VISUAL_CHANGE_APPROVED label authorizes a Linux baseline refresh.'
        required: false
        default: ''
      update_snapshots:
        description: 'Update baselines (--update-snapshots). Requires VISUAL_CHANGE_APPROVED label on the PR.'
        required: false
        default: 'false'

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual diff (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can diff against the base branch.
          fetch-depth: 0

      - name: Resolve visual approval gate
        id: approval
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumber = null;
            let labels = [];

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request?.number ?? null;
              labels = (context.payload.pull_request?.labels ?? []).map((label) => label.name);
            } else {
              const explicitPrNumber = (process.env.INPUT_PR_NUMBER || '').trim();

              if (explicitPrNumber) {
                prNumber = Number(explicitPrNumber);
              } else {
                const headRef = context.ref.replace('refs/heads/', '');
                const { data: pulls } = await github.rest.pulls.list({
                  owner,
                  repo,
                  head: `${owner}:${headRef}`,
                  state: 'open',
                  per_page: 1,
                });
                prNumber = pulls[0]?.number ?? null;
              }

              if (prNumber) {
                const { data: pull } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                labels = (pull.labels ?? []).map((label) => label.name);
              }
            }

            const hasApprovedLabel = labels.includes('VISUAL_CHANGE_APPROVED');

            core.setOutput('pr_number', prNumber ? String(prNumber) : '');
            core.setOutput('has_approved_label', hasApprovedLabel ? 'true' : 'false');

            if (context.eventName === 'workflow_dispatch' && !prNumber) {
              core.setFailed(
                'workflow_dispatch requires inputs.pr_number or an open PR for the current branch.',
              );
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            e2e/package-lock.json
            frontend/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install frontend dependencies
        if: vars.STAGING_FRONTEND_URL == ''
        working-directory: frontend
        run: npm ci

      - name: Build local frontend fallback
        if: vars.STAGING_FRONTEND_URL == ''
        working-directory: frontend
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          SERVICE_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXT_PUBLIC_SERVICE_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXTAUTH_URL: http://127.0.0.1:3000
          NODE_ENV: production
        run: npm run build -- --webpack

      - name: Start local frontend fallback
        if: vars.STAGING_FRONTEND_URL == ''
        working-directory: frontend
        env:
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          SERVICE_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXT_PUBLIC_SERVICE_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXTAUTH_URL: http://127.0.0.1:3000
          NODE_ENV: production
        run: |
          set -euo pipefail
          nohup npm run start -- --hostname 127.0.0.1 --port 3000 >/tmp/kloel-visual-frontend.log 2>&1 &
          echo $! >/tmp/kloel-visual-frontend.pid

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/login >/dev/null; then
              echo "Local frontend fallback is ready."
              exit 0
            fi
            sleep 2
          done

          echo "::error::Local frontend fallback did not become ready within 120 seconds."
          tail -n 200 /tmp/kloel-visual-frontend.log || true
          exit 1

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run visual regression
        id: visual
        working-directory: e2e
        env:
          E2E_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
          E2E_API_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          SERVICE_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_API_TOKEN: ${{ secrets.E2E_API_TOKEN }}
          E2E_WORKSPACE_ID: ${{ secrets.E2E_WORKSPACE_ID }}
          # Workflow inputs are surfaced via env to avoid expression
          # injection risks; we read them as plain strings inside the
          # script.
          UPDATE_SNAPSHOTS_INPUT: ${{ inputs.update_snapshots }}
          EVENT_NAME: ${{ github.event_name }}
          HAS_APPROVED_LABEL: ${{ steps.approval.outputs.has_approved_label }}
        run: |
          set -euo pipefail
          export E2E_FRONTEND_URL="${E2E_FRONTEND_URL:-http://127.0.0.1:3000}"
          UPDATE_FLAG=""
          # Allow refreshing baselines ONLY when the PR has the
          # VISUAL_CHANGE_APPROVED label AND the workflow was dispatched
          # manually with update_snapshots=true. This double-gate
          # prevents accidental baseline drift from a CI re-run.
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$UPDATE_SNAPSHOTS_INPUT" == "true" ]]; then
            if [[ "$HAS_APPROVED_LABEL" == "true" ]]; then
              echo "VISUAL_CHANGE_APPROVED label present — capturing fresh baselines."
              UPDATE_FLAG="--update-snapshots"
            else
              echo "::error::update_snapshots=true requires the VISUAL_CHANGE_APPROVED label on the PR."
              exit 1
            fi
          fi
          npx playwright test --project=visual $UPDATE_FLAG

      - name: Upload refreshed baselines
        if: success() && github.event_name == 'workflow_dispatch' && inputs.update_snapshots == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-baselines
          path: e2e/visual/critical-flows.spec.ts-snapshots/
          retention-days: 14

      - name: Stop local frontend fallback
        if: always() && vars.STAGING_FRONTEND_URL == ''
        run: |
          if [[ -f /tmp/kloel-visual-frontend.pid ]]; then
            kill "$(cat /tmp/kloel-visual-frontend.pid)" || true
          fi

      - name: Upload diff artifacts on failure
        if: failure() && steps.visual.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14

      - name: Block PR if baselines were modified without label
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          HAS_APPROVED_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'VISUAL_CHANGE_APPROVED') }}
        run: |
          set -e
          # Reject any PR that touches the snapshot directory unless
          # it carries the VISUAL_CHANGE_APPROVED label.
          CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD | grep -E 'e2e/visual/.*\.png$' || true)
          if [[ -n "$CHANGED" ]]; then
            if [[ "$HAS_APPROVED_LABEL" != "true" ]]; then
              echo "::error::This PR modifies baseline screenshots but lacks the VISUAL_CHANGE_APPROVED label."
              echo "Modified baselines:"
              echo "$CHANGED"
              exit 1
            fi
            echo "VISUAL_CHANGE_APPROVED label present — baseline updates accepted."
          fi
