name: CodeQL

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '20 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: whatsapp_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/whatsapp_saas_test
      JWT_SECRET: test_secret
      REDIS_URL: redis://localhost:6379
      OPENAI_API_KEY: e2e-dummy-key
      NEXT_PUBLIC_API_URL: http://localhost:3001
      BACKEND_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: test_secret
      METRICS_TOKEN: test-metrics-token
      DIAG_TOKEN: test-diag-token
      ASAAS_WEBHOOK_TOKEN: test-asaas-token
      OPS_WEBHOOK_URL: https://example.com/ops-webhook
      DLQ_WEBHOOK_URL: https://example.com/dlq-webhook
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.FRONTEND_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.FRONTEND_SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.FRONTEND_SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.FRONTEND_SENTRY_PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            worker/package-lock.json
            e2e/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Prisma generate and migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: backend

      - name: Backend typecheck
        run: npm run typecheck
        working-directory: backend

      - name: Backend build
        run: npm run build
        working-directory: backend

      - name: Backend test
        run: npm test
        working-directory: backend

      - name: Worker typecheck
        run: npm run typecheck
        working-directory: worker

      - name: Frontend typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend

      - name: Frontend test
        run: npm test
        working-directory: frontend

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
