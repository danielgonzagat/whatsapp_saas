name: Codacy Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  codacy-analysis:
    name: Codacy Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard Codacy skip tags (push)
        if: github.event_name == 'push'
        run: npm run commit-msg:check -- --revset "${{ github.event.before }}..${{ github.sha }}"

      - name: Guard Codacy skip tags (pull request)
        if: github.event_name == 'pull_request'
        run: npm run commit-msg:check -- --revset "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          upload: true
          max-allowed-issues: 2147483647

      - name: Verify Codacy max-rigor lock
        env:
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        run: npm run codacy:check-max-rigor
