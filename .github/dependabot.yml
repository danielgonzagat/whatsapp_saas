version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: daily
      time: '06:00'
    rebase-strategy: auto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - automerge
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions-safe:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: daily
      time: '06:15'
    rebase-strategy: auto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automerge
    commit-message:
      prefix: chore
      include: scope
    groups:
      root-dev-patches:
        dependency-type: development
        update-types:
          - patch
          - minor
      root-prod-patches:
        dependency-type: production
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

