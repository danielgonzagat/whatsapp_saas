<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .cap-group { animation: cap-breathe 3s ease-in-out infinite; transform-origin: 100px 100px; }
      .stem-group { animation: stem-breathe 3s ease-in-out infinite; transform-origin: 100px 100px; }
      .circuit-cap { animation: pump-cap 3s ease-in-out infinite; }
      .node-cap { animation: node-cap-pulse 3s ease-in-out infinite; }
      .circuit-stem { animation: pump-stem 3s ease-in-out infinite; }
      .node-stem { animation: node-stem-pulse 3s ease-in-out infinite; }
    }
    @keyframes cap-breathe {
      0%   { transform: scaleY(1) scaleX(1); }
      35%  { transform: scaleY(1.15) scaleX(1.04); }
      50%  { transform: scaleY(0.88) scaleX(1.08); }
      65%  { transform: scaleY(1) scaleX(1); }
      100% { transform: scaleY(1) scaleX(1); }
    }
    @keyframes stem-breathe {
      0%   { transform: scaleY(1) scaleX(1); }
      35%  { transform: scaleY(1.08) scaleX(0.95); }
      50%  { transform: scaleY(0.85) scaleX(1.12); }
      65%  { transform: scaleY(1) scaleX(1); }
      100% { transform: scaleY(1) scaleX(1); }
    }
    @keyframes pump-cap {
      0%   { stroke-opacity: 0.35; stroke-width: 1.2; }
      33%  { stroke-opacity: 0.4; stroke-width: 1.2; }
      40%  { stroke-opacity: 1; stroke-width: 2.4; }
      50%  { stroke-opacity: 1; stroke-width: 2.6; }
      58%  { stroke-opacity: 0.5; stroke-width: 1.4; }
      68%  { stroke-opacity: 0.35; stroke-width: 1.2; }
      100% { stroke-opacity: 0.35; stroke-width: 1.2; }
    }
    @keyframes node-cap-pulse {
      0%   { r: 2.5; fill-opacity: 0.55; }
      33%  { r: 2.5; fill-opacity: 0.55; }
      40%  { r: 4.2; fill-opacity: 1; }
      50%  { r: 4.5; fill-opacity: 1; }
      58%  { r: 3; fill-opacity: 0.7; }
      68%  { r: 2.5; fill-opacity: 0.55; }
      100% { r: 2.5; fill-opacity: 0.55; }
    }
    @keyframes pump-stem {
      0%   { stroke-opacity: 0.3; stroke-width: 1; }
      40%  { stroke-opacity: 0.3; stroke-width: 1; }
      46%  { stroke-opacity: 1; stroke-width: 2.5; }
      55%  { stroke-opacity: 1; stroke-width: 2.8; }
      63%  { stroke-opacity: 0.5; stroke-width: 1.3; }
      72%  { stroke-opacity: 0.3; stroke-width: 1; }
      100% { stroke-opacity: 0.3; stroke-width: 1; }
    }
    @keyframes node-stem-pulse {
      0%   { r: 2; fill-opacity: 0.4; }
      40%  { r: 2; fill-opacity: 0.4; }
      46%  { r: 3.8; fill-opacity: 1; }
      55%  { r: 4.2; fill-opacity: 1; }
      63%  { r: 2.8; fill-opacity: 0.6; }
      72%  { r: 2; fill-opacity: 0.4; }
      100% { r: 2; fill-opacity: 0.4; }
    }
    @keyframes sp-L1  { 0%,43%{ opacity:0; cx:38;  cy:96;  } 49%{ opacity:.7;  } 100%{ opacity:0; cx:-10; cy:90;  } }
    @keyframes sp-L2  { 0%,43%{ opacity:0; cx:36;  cy:88;  } 49%{ opacity:.55; } 100%{ opacity:0; cx:-5;  cy:62;  } }
    @keyframes sp-UL1 { 0%,43%{ opacity:0; cx:48;  cy:75;  } 49%{ opacity:.7;  } 100%{ opacity:0; cx:10;  cy:22;  } }
    @keyframes sp-UL2 { 0%,43%{ opacity:0; cx:53;  cy:80;  } 49%{ opacity:.5;  } 100%{ opacity:0; cx:18;  cy:32;  } }
    @keyframes sp-TL1 { 0%,43%{ opacity:0; cx:70;  cy:58;  } 49%{ opacity:.7;  } 100%{ opacity:0; cx:45;  cy:-10; } }
    @keyframes sp-TL2 { 0%,43%{ opacity:0; cx:78;  cy:62;  } 49%{ opacity:.45; } 100%{ opacity:0; cx:55;  cy:-2;  } }
    @keyframes sp-T1  { 0%,43%{ opacity:0; cx:94;  cy:48;  } 49%{ opacity:.8;  } 100%{ opacity:0; cx:90;  cy:-25; } }
    @keyframes sp-T2  { 0%,43%{ opacity:0; cx:106; cy:50;  } 49%{ opacity:.6;  } 100%{ opacity:0; cx:112; cy:-20; } }
    @keyframes sp-TR1 { 0%,43%{ opacity:0; cx:122; cy:56;  } 49%{ opacity:.7;  } 100%{ opacity:0; cx:158; cy:-8;  } }
    @keyframes sp-TR2 { 0%,43%{ opacity:0; cx:128; cy:62;  } 49%{ opacity:.5;  } 100%{ opacity:0; cx:150; cy:0;   } }
    @keyframes sp-UR1 { 0%,43%{ opacity:0; cx:148; cy:75;  } 49%{ opacity:.65; } 100%{ opacity:0; cx:195; cy:25;  } }
    @keyframes sp-UR2 { 0%,43%{ opacity:0; cx:152; cy:82;  } 49%{ opacity:.45; } 100%{ opacity:0; cx:190; cy:38;  } }
    @keyframes sp-R1  { 0%,43%{ opacity:0; cx:160; cy:88;  } 49%{ opacity:.6;  } 100%{ opacity:0; cx:210; cy:65;  } }
    @keyframes sp-R2  { 0%,43%{ opacity:0; cx:163; cy:95;  } 49%{ opacity:.7;  } 100%{ opacity:0; cx:212; cy:90;  } }
  </style>

  <g transform="translate(0,0)">
    <!-- Stem -->
    <g class="stem-group">
      <rect x="88" y="100" width="24" height="50" rx="3" fill="#E85D30"/>
      <line class="circuit-stem" x1="100" y1="105" x2="100" y2="145" stroke="#FFFFFF"/>
      <circle class="node-stem" cx="100" cy="118" fill="#FFFFFF"/>
      <circle class="node-stem" cx="100" cy="135" fill="#FFFFFF"/>
    </g>

    <!-- Spores -->
    <circle r="2.2" fill="#E85D30" style="animation:sp-L1  3s ease-out infinite 0s"/>
    <circle r="1.5" fill="#E85D30" style="animation:sp-L2  3s ease-out infinite .04s"/>
    <circle r="2.4" fill="#E85D30" style="animation:sp-UL1 3s ease-out infinite .07s"/>
    <circle r="1.4" fill="#E85D30" style="animation:sp-UL2 3s ease-out infinite .02s"/>
    <circle r="2.0" fill="#E85D30" style="animation:sp-TL1 3s ease-out infinite .09s"/>
    <circle r="1.6" fill="#E85D30" style="animation:sp-TL2 3s ease-out infinite .05s"/>
    <circle r="2.8" fill="#E85D30" style="animation:sp-T1  3s ease-out infinite .03s"/>
    <circle r="1.8" fill="#E85D30" style="animation:sp-T2  3s ease-out infinite .08s"/>
    <circle r="2.2" fill="#E85D30" style="animation:sp-TR1 3s ease-out infinite .06s"/>
    <circle r="1.5" fill="#E85D30" style="animation:sp-TR2 3s ease-out infinite .01s"/>
    <circle r="2.0" fill="#E85D30" style="animation:sp-UR1 3s ease-out infinite .1s"/>
    <circle r="1.4" fill="#E85D30" style="animation:sp-UR2 3s ease-out infinite .04s"/>
    <circle r="1.8" fill="#E85D30" style="animation:sp-R1  3s ease-out infinite .07s"/>
    <circle r="2.0" fill="#E85D30" style="animation:sp-R2  3s ease-out infinite .02s"/>

    <!-- Cap -->
    <g class="cap-group">
      <path d="M40,100 Q35,50 70,30 Q100,15 130,30 Q165,50 160,100 Z" fill="#E85D30"/>
      <line class="circuit-cap" x1="70" y1="70" x2="90" y2="50" stroke="#FFFFFF"/>
      <line class="circuit-cap" x1="90" y1="50" x2="115" y2="50" stroke="#FFFFFF"/>
      <line class="circuit-cap" x1="115" y1="50" x2="130" y2="65" stroke="#FFFFFF"/>
      <line class="circuit-cap" x1="100" y1="75" x2="100" y2="40" stroke="#FFFFFF"/>
      <circle class="node-cap" cx="70" cy="70" fill="#FFFFFF"/>
      <circle class="node-cap" cx="90" cy="50" fill="#FFFFFF"/>
      <circle class="node-cap" cx="115" cy="50" fill="#FFFFFF"/>
      <circle class="node-cap" cx="130" cy="65" fill="#FFFFFF"/>
      <circle class="node-cap" cx="100" cy="40" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
