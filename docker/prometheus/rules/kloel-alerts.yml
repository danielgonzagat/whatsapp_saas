groups:
  - name: kloel_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Service is down'

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'High 5xx rate'

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'p95 latency above 1s'

      - alert: QueueBacklog
        expr: bullmq_waiting_jobs > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Queue backlog above threshold'
