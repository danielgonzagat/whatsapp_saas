# NOTE: This docker-compose is for LOCAL DEVELOPMENT only.
# Production deployment uses Railway services (backend, frontend, worker)
# without nginx, prometheus, grafana, or alertmanager.
version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: whatsapp_saas_db
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - 'no-new-privileges:true'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_saas}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatsapp_saas_redis
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - 'no-new-privileges:true'
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp_saas_backend
    restart: always
    security_opt:
      - 'no-new-privileges:true'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatsapp_saas}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      WAHA_API_URL: ${WAHA_API_URL:-https://devlikeaprowaha-production-19f9.up.railway.app}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WHATSAPP_PROVIDER_DEFAULT: ${WHATSAPP_PROVIDER_DEFAULT:-whatsapp-web-agent}
      WORKER_BROWSER_RUNTIME_URL: ${WORKER_BROWSER_RUNTIME_URL:-http://worker:3003}
      SCREENCAST_SHARED_SECRET: ${SCREENCAST_SHARED_SECRET:-}
      SCREENCAST_TOKEN_TTL_SECONDS: ${SCREENCAST_TOKEN_TTL_SECONDS:-120}
      JWT_SECRET: ${JWT_SECRET}
      DD_SERVICE: ${DD_SERVICE:-kloel-backend}
      DD_ENV: ${DD_ENV:-development}
      DD_VERSION: ${DD_VERSION:-1.0.0}
      DD_TRACE_AGENT_URL: ${DD_TRACE_AGENT_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      GOOGLE_ALLOWED_CLIENT_IDS: ${GOOGLE_ALLOWED_CLIENT_IDS:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: whatsapp_saas_worker
    restart: always
    security_opt:
      - 'no-new-privileges:true'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatsapp_saas}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      WAHA_API_URL: ${WAHA_API_URL:-https://devlikeaprowaha-production-19f9.up.railway.app}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WHATSAPP_PROVIDER_DEFAULT: ${WHATSAPP_PROVIDER_DEFAULT:-whatsapp-web-agent}
      WHATSAPP_BROWSER_PROFILE_DIR: /data/browser-sessions
      WHATSAPP_BROWSER_HEADLESS: ${WHATSAPP_BROWSER_HEADLESS:-false}
      SCREENCAST_WS_PORT: ${SCREENCAST_WS_PORT:-3004}
      SCREENCAST_QUALITY: ${SCREENCAST_QUALITY:-70}
      SCREENCAST_MAX_WIDTH: ${SCREENCAST_MAX_WIDTH:-1440}
      SCREENCAST_MAX_HEIGHT: ${SCREENCAST_MAX_HEIGHT:-900}
      SCREENCAST_EVERY_NTH_FRAME: ${SCREENCAST_EVERY_NTH_FRAME:-1}
      SCREENCAST_SHARED_SECRET: ${SCREENCAST_SHARED_SECRET:-}
      SCREENCAST_MAX_VIEWERS_PER_WORKSPACE: ${SCREENCAST_MAX_VIEWERS_PER_WORKSPACE:-4}
      SCREENCAST_TOKEN_TTL_SECONDS: ${SCREENCAST_TOKEN_TTL_SECONDS:-120}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3003:3003'
      - '3004:3004'
    volumes:
      - ./worker:/app
      - /app/node_modules
      - browser_sessions:/data/browser-sessions

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_SCREENCAST_WS_URL: ${SCREENCAST_WS_URL:-ws://localhost:3004}
        NEXT_PUBLIC_DD_SITE: ${NEXT_PUBLIC_DD_SITE:-datadoghq.com}
        NEXT_PUBLIC_DD_SERVICE: ${NEXT_PUBLIC_DD_SERVICE:-kloel-frontend}
        NEXT_PUBLIC_DD_ENV: ${NEXT_PUBLIC_DD_ENV:-development}
        NEXT_PUBLIC_DD_VERSION: ${NEXT_PUBLIC_DD_VERSION:-1.0.0}
        NEXT_PUBLIC_DD_CLIENT_TOKEN: ${NEXT_PUBLIC_DD_CLIENT_TOKEN:-}
        NEXT_PUBLIC_DD_APPLICATION_ID: ${NEXT_PUBLIC_DD_APPLICATION_ID:-}
        NEXT_PUBLIC_DD_SESSION_SAMPLE_RATE: ${NEXT_PUBLIC_DD_SESSION_SAMPLE_RATE:-100}
        NEXT_PUBLIC_DD_SESSION_REPLAY_SAMPLE_RATE: ${NEXT_PUBLIC_DD_SESSION_REPLAY_SAMPLE_RATE:-20}
        NEXT_PUBLIC_DD_LOGS_SESSION_SAMPLE_RATE: ${NEXT_PUBLIC_DD_LOGS_SESSION_SAMPLE_RATE:-100}
        NEXT_PUBLIC_DD_FORWARD_CONSOLE_LOGS: ${NEXT_PUBLIC_DD_FORWARD_CONSOLE_LOGS:-error}
        NEXT_PUBLIC_DD_RUM_ENABLED: ${NEXT_PUBLIC_DD_RUM_ENABLED:-}
        NEXT_PUBLIC_DD_LOGS_ENABLED: ${NEXT_PUBLIC_DD_LOGS_ENABLED:-}
    container_name: whatsapp_saas_frontend
    restart: always
    security_opt:
      - 'no-new-privileges:true'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
      BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SCREENCAST_WS_URL: ${SCREENCAST_WS_URL:-ws://localhost:3004}
      NEXT_PUBLIC_DD_SITE: ${NEXT_PUBLIC_DD_SITE:-datadoghq.com}
      NEXT_PUBLIC_DD_SERVICE: ${NEXT_PUBLIC_DD_SERVICE:-kloel-frontend}
      NEXT_PUBLIC_DD_ENV: ${NEXT_PUBLIC_DD_ENV:-development}
      NEXT_PUBLIC_DD_VERSION: ${NEXT_PUBLIC_DD_VERSION:-1.0.0}
      NEXT_PUBLIC_DD_CLIENT_TOKEN: ${NEXT_PUBLIC_DD_CLIENT_TOKEN:-}
      NEXT_PUBLIC_DD_APPLICATION_ID: ${NEXT_PUBLIC_DD_APPLICATION_ID:-}
      NEXT_PUBLIC_DD_SESSION_SAMPLE_RATE: ${NEXT_PUBLIC_DD_SESSION_SAMPLE_RATE:-100}
      NEXT_PUBLIC_DD_SESSION_REPLAY_SAMPLE_RATE: ${NEXT_PUBLIC_DD_SESSION_REPLAY_SAMPLE_RATE:-20}
      NEXT_PUBLIC_DD_LOGS_SESSION_SAMPLE_RATE: ${NEXT_PUBLIC_DD_LOGS_SESSION_SAMPLE_RATE:-100}
      NEXT_PUBLIC_DD_FORWARD_CONSOLE_LOGS: ${NEXT_PUBLIC_DD_FORWARD_CONSOLE_LOGS:-error}
      NEXT_PUBLIC_DD_RUM_ENABLED: ${NEXT_PUBLIC_DD_RUM_ENABLED:-}
      NEXT_PUBLIC_DD_LOGS_ENABLED: ${NEXT_PUBLIC_DD_LOGS_ENABLED:-}
    depends_on:
      backend:
        condition: service_started

  prometheus:
    image: prom/prometheus
    container_name: whatsapp_saas_prometheus
    read_only: true
    tmpfs:
      - /tmp
      - /prometheus
    security_opt:
      - 'no-new-privileges:true'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: whatsapp_saas_grafana
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - 'no-new-privileges:true'
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json

  alertmanager:
    image: prom/alertmanager
    container_name: whatsapp_saas_alertmanager
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /alertmanager
    security_opt:
      - 'no-new-privileges:true'
    ports:
      - '9093:9093'
    environment:
      ALERT_WEBHOOK_URL: ${OPS_WEBHOOK_URL}
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--config.expand-env'
    depends_on:
      - prometheus

  # WhatsApp API (chrishubert) foi removido — agora usa WAHA externo

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  browser_sessions:
