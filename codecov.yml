ignore:
  - ".github"
  - "docs"
  - "e2e"
  - "scripts"
  - "PULSE_.*"
  - "AUDIT_FEATURE_MATRIX.md"
  - "KLOEL_PRODUCT_MAP.md"
  - "ratchet.json"
  - ".mcp.json"
  - "**/__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"
  - "frontend/vitest.config.ts"
  - "worker/vitest.config.ts"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: 80%
        threshold: 0%

comment:
  layout: 'reach,diff,flags,tree'
  require_changes: true
