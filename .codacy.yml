# Codacy repository configuration
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/
#
# MAX-RIGOR LOCK (2026-04-19):
# - Codacy must analyze the widest possible versioned surface of this repo.
# - Rules and tools are configured in Codacy's published coding standard and
#   enforced live via scripts/ops/codacy-enforce-max-rigor.mjs.
# - This file exists only to exclude non-source generated/vendor outputs that
#   would create false negatives or meaningless duplicate scans.
# - Do not add path exclusions for tests, docs, scripts, migrations, product
#   maps, PULSE artifacts, or any other versioned source. If the analysis is
#   noisy, fix code or tighten governance — never shrink Codacy's scope.

engines:
  eslint:
    enabled: true
  biome:
    enabled: true
  opengrep:
    enabled: true
  semgrep:
    enabled: true
  trivy:
    enabled: true
  lizard:
    enabled: true

exclude_paths:
  # Vendored dependencies and generated build artifacts only.
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/.next/**'
  - '**/.next-types/**'
  - '**/.turbo/**'
  - '**/out/**'
  - '**/build/**'
  - '**/coverage/**'
  - '**/test-results/**'
  - '**/playwright-report/**'
